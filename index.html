<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R语言教材 - 在线例题</title>
<style>
:root {
  --primary: #1a1a2e;
  --accent: #6C63FF;
  --accent2: #FF6584;
  --accent-grad: linear-gradient(135deg, #6C63FF, #4834d4);
  --success: #00C9A7;
  --bg: #f5f5f7;
  --bg-card: rgba(255,255,255,0.72);
  --bg-card-solid: #fff;
  --bg-hover: rgba(255,255,255,0.9);
  --text: #1a1a2e;
  --text2: #555;
  --text3: #999;
  --border: rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 8px rgba(108,99,255,0.06);
  --shadow: 0 8px 32px rgba(108,99,255,0.10);
  --shadow-lg: 0 20px 60px rgba(108,99,255,0.13);
  --radius: 20px;
  --radius-sm: 14px;
  --code-bg: #fafafa;
  --code-header: #f3f4f6;
  --code-border: #e5e7eb;
  --code-text: #383a42;
  --code-linenums: #9ca3af;
  --code-linenums-bg: #f3f4f6;
  --code-linenums-border: #e5e7eb;
  --code-bar-border: #e5e7eb;
  --code-lang-color: #6b7280;
  --code-lang-dot: #ef4444;
  --code-copy-bg: rgba(0,0,0,0.04);
  --code-copy-border: rgba(0,0,0,0.08);
  --code-copy-color: #6b7280;
  --code-copy-hover-bg: rgba(0,0,0,0.08);
  --code-copy-hover-color: #374151;
  --code-copy-ok-bg: rgba(16,185,129,0.1);
  --code-copy-ok-border: rgba(16,185,129,0.3);
  --code-copy-ok-color: #059669;
  --hl-comment: #a0a1a7;
  --hl-keyword: #a626a4;
  --hl-function: #4078f2;
  --hl-string: #50a14f;
  --hl-operator: #0184bc;
  --hl-number: #986801;
  --hl-paren: #383a42;
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #0f0f1a;
  --bg-card: rgba(30,30,50,0.72);
  --bg-card-solid: #1a1a2e;
  --bg-hover: rgba(40,40,60,0.9);
  --text: #f0f0f5;
  --text2: #aab;
  --text3: #667;
  --border: rgba(255,255,255,0.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.4);
  --code-bg: #1b1d23;
  --code-header: #17191f;
  --code-border: #0f1115;
  --code-text: #abb2bf;
  --code-linenums: #4b5263;
  --code-linenums-bg: rgba(0,0,0,0.15);
  --code-linenums-border: rgba(255,255,255,0.04);
  --code-bar-border: rgba(255,255,255,0.06);
  --code-lang-color: #9da5b4;
  --code-lang-dot: #e06c75;
  --code-copy-bg: rgba(255,255,255,0.06);
  --code-copy-border: rgba(255,255,255,0.08);
  --code-copy-color: #9da5b4;
  --code-copy-hover-bg: rgba(255,255,255,0.12);
  --code-copy-hover-color: #abb2bf;
  --code-copy-ok-bg: rgba(0,201,167,0.15);
  --code-copy-ok-border: rgba(0,201,167,0.3);
  --code-copy-ok-color: #00C9A7;
  --hl-comment: #5c6370;
  --hl-keyword: #c678dd;
  --hl-function: #61afef;
  --hl-string: #98c379;
  --hl-operator: #56b6c2;
  --hl-number: #d19a66;
  --hl-paren: #abb2bf;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;transition:background .4s,color .4s}
a{color:var(--accent);text-decoration:none;transition:var(--transition)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
::selection{background:rgba(108,99,255,0.2);color:var(--text)}

/* ====== Header ====== */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--bg-card);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 28px;display:flex;align-items:center;justify-content:space-between;
}
.header-left{display:flex;align-items:center;gap:12px}
.logo{
  width:36px;height:36px;border-radius:10px;
  background:var(--accent-grad);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:15px;
  box-shadow:0 4px 14px rgba(108,99,255,0.35);
}
.header h1{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:var(--text3);font-weight:500;margin-top:1px}
.header-right{display:flex;gap:6px;align-items:center}
.btn-icon-h{
  width:34px;height:34px;border-radius:10px;
  background:transparent;border:1px solid var(--border);
  color:var(--text2);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--transition);
}
.btn-icon-h:hover{background:var(--bg-hover);color:var(--accent);border-color:var(--accent)}
.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:10px;
  background:var(--bg-card);border:1px solid var(--border);
  color:var(--text2);font-size:13px;cursor:pointer;font-weight:500;
  transition:var(--transition);
}
.btn-back:hover{color:var(--accent);border-color:var(--accent)}

/* ====== Hero ====== */
.hero{
  position:relative;overflow:hidden;
  padding:72px 20px 48px;text-align:center;
}
.hero-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(108,99,255,0.12),transparent),
             radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,101,132,0.08),transparent);
}
.hero-orb{
  position:absolute;border-radius:50%;filter:blur(60px);opacity:0.18;pointer-events:none;
  animation:orbFloat 8s ease-in-out infinite;
}
.hero-orb-1{width:300px;height:300px;background:#6C63FF;top:-80px;left:10%}
.hero-orb-2{width:200px;height:200px;background:#FF6584;bottom:-40px;right:8%;animation-delay:-4s}
.hero-orb-3{width:160px;height:160px;background:#00C9A7;top:20%;right:25%;animation-delay:-2s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.hero-content{position:relative;z-index:2}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;border-radius:20px;
  background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.15);
  color:var(--accent);font-size:12px;font-weight:600;
  margin-bottom:20px;
}
.hero-title{
  font-size:clamp(32px,6vw,52px);font-weight:900;letter-spacing:-1.5px;line-height:1.15;
  margin-bottom:16px;
}
.hero-title .grad{
  background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-desc{
  font-size:17px;color:var(--text2);max-width:520px;margin:0 auto 32px;line-height:1.7;
}

/* ====== Stats ====== */
.stats-row{
  display:flex;justify-content:center;gap:36px;
  position:relative;z-index:2;
  margin-bottom:12px;
}
.stat-item{text-align:center}
.stat-val{font-size:28px;font-weight:900;color:var(--accent);line-height:1}
.stat-lbl{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500}

/* ====== Container ====== */
.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* ====== Filters ====== */
.filter-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin-bottom:32px;
  position:sticky;top:61px;z-index:50;
  background:var(--bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  padding:14px 0;
  border-bottom:1px solid var(--border);
}
.search-wrap{
  flex:1;min-width:200px;position:relative;
}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{
  width:100%;padding:10px 36px 10px 38px;
  border:1px solid var(--border);border-radius:12px;
  background:var(--bg-card);color:var(--text);
  font-size:14px;outline:none;transition:var(--transition);
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.12)}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border-radius:50%;border:none;
  background:var(--border);color:var(--text3);cursor:pointer;
  display:none;align-items:center;justify-content:center;font-size:11px;padding:0;
}
.search-clear.show{display:flex}
.chapter-pills{display:flex;gap:6px;flex-wrap:wrap}
.ch-pill{
  padding:7px 14px;border-radius:10px;
  border:1px solid var(--border);background:var(--bg-card);
  font-size:13px;cursor:pointer;transition:var(--transition);
  color:var(--text2);font-weight:500;white-space:nowrap;
}
.ch-pill:hover{border-color:var(--accent);color:var(--accent)}
.ch-pill.on{
  background:var(--accent-grad);color:#fff;border-color:transparent;
  box-shadow:0 4px 14px rgba(108,99,255,0.3);
}

/* ====== Chapter Section ====== */
.chapter-sec{margin-bottom:44px}
.ch-head{
  display:flex;align-items:center;gap:14px;
  margin-bottom:18px;padding-bottom:10px;
  border-bottom:2px solid var(--border);
}
.ch-num{
  width:38px;height:38px;border-radius:11px;
  background:var(--accent-grad);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;flex-shrink:0;
  box-shadow:0 4px 14px rgba(108,99,255,0.3);
}
.ch-name{font-size:17px;font-weight:700}
.ch-cnt{margin-left:auto;font-size:12px;color:var(--text3);font-weight:500}

/* ====== Cards ====== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{
  background:var(--bg-card);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:20px;cursor:pointer;transition:var(--transition);
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(108,99,255,0.04),transparent);
  opacity:0;transition:var(--transition);
}
.card:hover{
  transform:translateY(-4px);box-shadow:var(--shadow);
  border-color:rgba(108,99,255,0.2);
}
.card:hover::after{opacity:1}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-idx{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:700;
  color:var(--accent);background:rgba(108,99,255,0.08);
  padding:3px 9px;border-radius:6px;
}
.card-go{color:var(--text3);opacity:0;transition:var(--transition);font-size:13px}
.card:hover .card-go{opacity:1;transform:translateX(3px)}
.card-ttl{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.4;position:relative;z-index:1}
.card-desc{
  font-size:14px;color:var(--text2);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;margin-bottom:12px;line-height:1.6;position:relative;z-index:1;
}
.card-ft{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.card-tag{
  font-size:10px;padding:2px 7px;border-radius:4px;
  background:rgba(108,99,255,0.06);color:var(--text3);font-weight:500;
}
.diff{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.diff.easy{color:#00C9A7;background:rgba(0,201,167,0.1)}
.diff.medium{color:#6C63FF;background:rgba(108,99,255,0.1)}
.diff.hard{color:#FF6584;background:rgba(255,101,132,0.1)}

/* ====== Detail ====== */
.detail{max-width:960px;margin:0 auto;padding:24px 0 48px}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:12px;color:var(--text3)}
.breadcrumb a{color:var(--text3)}.breadcrumb a:hover{color:var(--accent)}
.breadcrumb .sep{opacity:0.4}

.prob-card{
  background:var(--bg-card);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:var(--radius);padding:32px;
  margin-bottom:24px;box-shadow:var(--shadow);
}
.prob-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px}
.prob-num{
  width:44px;height:44px;border-radius:13px;
  background:var(--accent-grad);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:17px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(108,99,255,0.35);
}
.prob-meta h2{font-size:20px;font-weight:800;margin-bottom:4px;line-height:1.3}
.prob-ch{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.prob-desc{
  background:linear-gradient(135deg,rgba(108,99,255,0.06),rgba(255,101,132,0.04));
  border-left:3px solid var(--accent);
  padding:16px 20px;border-radius:0 12px 12px 0;
  font-size:14px;line-height:1.8;color:var(--text2);
}
.prob-desc strong{color:var(--accent)}

/* Code */
.code-sec{margin-top:24px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700}
.sec-icon{
  width:26px;height:26px;border-radius:7px;
  background:rgba(108,99,255,0.1);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:12px;
}

.code-block{
  background:var(--code-bg);border:1px solid var(--code-border);
  border-radius:10px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.code-bar{
  background:var(--code-header);padding:0 16px;height:38px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--code-bar-border);
}
.code-lang{
  font-size:12px;font-weight:600;color:var(--code-lang-color);
  font-family:"Fira Code","Consolas",monospace;
  display:flex;align-items:center;gap:6px;
  letter-spacing:0.3px;
}
.code-lang::before{
  content:'';display:inline-block;width:8px;height:8px;
  border-radius:50%;background:var(--code-lang-dot);opacity:0.8;
}
.copy-btn{
  background:var(--code-copy-bg);border:1px solid var(--code-copy-border);
  padding:4px 10px;border-radius:6px;
  font-size:12px;cursor:pointer;font-weight:500;
  display:flex;align-items:center;gap:5px;
  transition:var(--transition);color:var(--code-copy-color);
  height:26px;
}
.copy-btn:hover{background:var(--code-copy-hover-bg);color:var(--code-copy-hover-color);border-color:var(--code-copy-border)}
.copy-btn.ok{background:var(--code-copy-ok-bg);border-color:var(--code-copy-ok-border);color:var(--code-copy-ok-color)}
.code-wrap{display:flex;overflow-x:auto}
.code-nums{
  background:var(--code-linenums-bg);padding:16px 12px 16px 16px;
  font-family:"Fira Code","Consolas",monospace;font-size:14px;line-height:1.75;
  color:var(--code-linenums);text-align:right;user-select:none;white-space:pre;
  border-right:1px solid var(--code-linenums-border);flex-shrink:0;
  min-width:44px;
}
.code-body{
  padding:16px 20px;
  font-family:"Fira Code","Consolas",monospace;font-size:14px;line-height:1.75;
  overflow-x:auto;white-space:pre;color:var(--code-text);flex:1;
  tab-size:2;
}
@media(max-width:640px){
  .code-body{font-size:12px;padding:12px 14px}
  .code-nums{font-size:12px;padding:12px 8px 12px 12px}
}
/* Syntax colors (auto-switch with theme) */
.code-body .comment{color:var(--hl-comment);font-style:italic}
.code-body .keyword{color:var(--hl-keyword);font-weight:500}
.code-body .function{color:var(--hl-function);font-weight:500}
.code-body .string{color:var(--hl-string)}
.code-body .operator{color:var(--hl-operator)}
.code-body .number{color:var(--hl-number)}
.code-body .paren{color:var(--hl-paren)}

/* Result */
.res-sec{margin-top:20px}
.res-click{
  background:var(--bg-card);border:2px dashed var(--border);
  border-radius:10px;padding:32px 20px;
  text-align:center;cursor:pointer;transition:var(--transition);
}
.res-click:hover{border-color:var(--accent);background:rgba(108,99,255,0.04);transform:translateY(-2px);box-shadow:var(--shadow)}
.res-click-icon{
  width:44px;height:44px;border-radius:12px;
  background:var(--code-linenums-bg);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin:0 auto 10px;
}
.res-click-txt{color:var(--text2);font-size:14px;font-weight:600}
.res-click-sub{font-size:12px;color:var(--text3);margin-top:4px}
.res-show{
  display:none;
  background:var(--bg-card);
  border-radius:10px;overflow:hidden;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  animation:fadeUp .4s ease;
}
.res-show.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.res-bar{
  background:var(--code-header);
  padding:0 16px;height:38px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;font-weight:600;
  border-bottom:1px solid var(--code-bar-border);
}
.res-bar-label{
  display:flex;align-items:center;gap:6px;
  color:var(--code-lang-color);
  font-family:"Fira Code","Consolas",monospace;
  letter-spacing:0.3px;
}
.res-bar-label::before{
  content:'';display:inline-block;width:8px;height:8px;
  border-radius:50%;background:var(--success);opacity:0.8;
}
.res-toggle{
  background:var(--code-copy-bg);border:1px solid var(--code-copy-border);
  padding:3px 9px;border-radius:6px;
  font-size:11px;cursor:pointer;color:var(--code-copy-color);font-weight:500;transition:var(--transition);
}
.res-toggle:hover{background:var(--code-copy-hover-bg);color:var(--code-copy-hover-color)}
.res-body{padding:16px 20px;background:var(--code-bg)}
.res-text{
  font-family:"Fira Code","Consolas",monospace;
  font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--code-text);
}
.res-svg{max-width:100%;height:auto;display:block;margin:0 auto;background:#fff;border-radius:8px;box-shadow:var(--shadow-sm)}
.res-img{display:flex;justify-content:center}
.res-caption{font-size:12px;color:var(--code-linenums);margin-top:12px;font-style:italic;padding:0 4px}

/* Nav */
.nav-sec{margin-top:24px}
.nav-row{display:flex;justify-content:space-between;gap:10px}
.nav-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 20px;border-radius:12px;
  border:1px solid var(--border);background:var(--bg-card);
  font-size:13px;cursor:pointer;transition:var(--transition);
  color:var(--text);box-shadow:var(--shadow-sm);flex:1;justify-content:center;font-weight:500;
}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--shadow)}
.nav-btn.off{opacity:0.3;cursor:not-allowed}
.nav-btn.off:hover{border-color:var(--border);color:var(--text2);box-shadow:none}
.nav-btn.next{
  background:var(--accent-grad);color:#fff;border-color:transparent;font-weight:600;
  box-shadow:0 4px 14px rgba(108,99,255,0.3);
}
.nav-btn.next:hover{transform:translateX(3px);box-shadow:0 6px 20px rgba(108,99,255,0.4)}
.nav-btn.next.off{background:var(--border);color:var(--text3);transform:none;box-shadow:none;border-color:transparent}

/* Empty */
.empty{text-align:center;padding:72px 20px;color:var(--text2)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:0.4}
.empty h3{font-size:17px;margin-bottom:6px;font-weight:700}
.empty p{font-size:13px;color:var(--text3)}

/* Toast */
.toast{
  position:fixed;top:76px;left:50%;
  transform:translateX(-50%) translateY(-16px);
  background:var(--primary);color:#fff;
  padding:10px 22px;border-radius:12px;

<body>
<noscript><div style="padding:40px;text-align:center;font-family:sans-serif"><h2>请启用 JavaScript</h2><p>本页面需要 JavaScript 才能正常显示内容。</p></div></noscript>

<div id="app">
  <header class="header">
    <div class="header-left">
      <div class="logo">R</div>

  </button>

  <footer class="footer">R语言实战分析教材配套在线例题 · 扫码即可查看。技术支持:知远科技</footer>
</div>

<script src="r-examples-data.js"></script>
<script>
if(!Array.prototype.find){Array.prototype.find=function(p){for(var i=0;i<this.length;i++)if(p(this[i],i,this))return this[i]}}
if(!Array.prototype.findIndex){Array.prototype.findIndex=function(p){for(var i=0;i<this.length;i++)if(p(this[i],i,this))return i;return-1}}
window.onerror=function(m,u,l,c,e){var d=(m||'Error')+' (L'+l+')';document.body.innerHTML='<div style="padding:40px;font-family:sans-serif;max-width:500px;margin:0 auto"><h2 style="color:#c00">页面出错</h2><p style="color:#666;white-space:pre-wrap">'+d.replace(/</g,'&lt;')+'</p><p style="margin-top:16px"><a href="#" onclick="location.reload();return false" style="color:#6C63FF">刷新重试</a></p></div>'};

var EXAMPLES=EXAMPLES_DATA.examples;

// 自动从例题数据中提取章节信息，无需手动维护
var CHAPTERS=(function(){
  var map={},arr=[];
  for(var i=0;i<EXAMPLES.length;i++){
    var e=EXAMPLES[i];
    if(!map[e.chapter]){map[e.chapter]={chapter:e.chapter,title:e.chapterTitle,count:0};arr.push(map[e.chapter])}
    map[e.chapter].count++;
  }
  arr.sort(function(a,b){return a.chapter-b.chapter});
  return arr;
})();

// ====== Utils ======
function getEx(id){return EXAMPLES.find(function(e){return e.id===id})}
function getAdj(id){var i=EXAMPLES.findIndex(function(e){return e.id===id});return{prev:i>0?EXAMPLES[i-1]:null,next:i<EXAMPLES.length-1?EXAMPLES[i+1]:null}}
function esc(s){if(!s)return'';var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}
function toast(m,t){t=t||'success';var el=document.getElementById('toast');var ic=t==='success'?'\u2713':'\u2139';el.innerHTML='<span style="font-size:15px;font-weight:700">'+ic+'</span><span>'+esc(m)+'</span>';el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2200)}
function diffLabel(d){if(d==='easy')return{text:'入门',cls:'easy'};if(d==='medium')return{text:'进阶',cls:'medium'};return{text:'挑战',cls:'hard'}}

// ====== Syntax Highlight ======
function hlR(code){
  var r=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var S='\x01',E='\x02';
  r=r.replace(/(#.*$)/gm,S+'C$1'+E);
  r=r.replace(/"(?:[^"\\]|\\.)*"/g,function(m){return S+'S'+m+E});
  var kw='function|if|else|for|while|repeat|return|next|break|TRUE|FALSE|NULL|NA|Inf|NaN|library|require|data|head|str|summary|nrow|subset|order|plot|abline|lm|legend|ggplot|geom_point|geom_line|geom_bar|geom_histogram|aes|labs|theme_minimal|theme|scale_color_manual|facet_wrap|facet_grid|group_by|summarise|mutate|filter|select|arrange|t.test|read.csv|write.csv|file.info|print|n|mean|sd|median|min|max|par|mfrow';
  r=r.replace(new RegExp('\\b('+kw+')\\b','g'),S+'K$1'+E);
  r=r.replace(/(^|[^\w&;.])(\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)(?![\w;.%])/g,'$1'+S+'N$2'+E);
  r=r.replace(/(&lt;-|-&gt;|==|!=|%&gt;%|%%|%\/%|\+|\-|\*|\/|\^|&lt;=|&gt;=)/g,S+'O$1'+E);
  r=r.replace(/\b([a-zA-Z_][a-zA-Z0-9._]*)(?=\s*\()/g,S+'F$1'+E);
  r=r.replace(/([(){}[\]])/g,S+'P$1'+E);
  var map={C:'comment',S:'string',K:'keyword',N:'number',O:'operator',F:'function',P:'paren'};
  for(var k in map){r=r.replace(new RegExp(S+k+'(.*?)'+E,'g'),'<span class="'+map[k]+'">$1</span>')}
  return r;
}
function lineNums(code){var n=code.split('\n').length,s='';for(var i=1;i<=n;i++)s+=i+'\n';return s}
function renderRes(res){
  if(res.type==='svg')return'<div class="res-svg">'+res.content+'</div>';
  if(res.type==='image')return'<div class="res-img"><img src="'+esc(res.content)+'" alt="'+esc(res.caption||'运行结果')+'" style="max-width:100%;height:auto;border-radius:8px;box-shadow:var(--shadow-sm)"></div>';
  return'<pre class="res-text">'+esc(res.content)+'</pre>';
}

// ====== Index ======
function renderIndex(ch,q,tag){
  ch=ch||0;q=(q||'').toLowerCase().trim();tag=tag||'';
  var h='';

  // Hero
  h+='<div class="hero">';
  h+='<div class="hero-bg"></div>';
  h+='<div class="hero-orb hero-orb-1"></div><div class="hero-orb hero-orb-2"></div><div class="hero-orb hero-orb-3"></div>';
  h+='<div class="hero-content">';
  h+='<div class="hero-badge">&#9679; 交互式在线例题库</div>';
  h+='<div class="hero-title"><span class="grad">R语言教材</span><br>在线例题</div>';
  h+='<p class="hero-desc">精选 '+EXAMPLES.length+' 道例题，涵盖基础语法、数据处理、可视化与统计分析，边学边练</p>';
  h+='<div class="stats-row">';
  h+='<div class="stat-item"><div class="stat-val">'+EXAMPLES.length+'</div><div class="stat-lbl">道例题</div></div>';
  h+='<div class="stat-item"><div class="stat-val">'+CHAPTERS.length+'</div><div class="stat-lbl">个章节</div></div>';
  h+='<div class="stat-item"><div class="stat-val">5</div><div class="stat-lbl">大专题</div></div>';
  h+='</div></div></div>';

  // Filter bar
  h+='<div class="filter-bar">';
  h+='<div class="search-wrap">';
  h+='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>';
  h+='<input type="text" class="search-input" id="si" placeholder="搜索例题..." value="'+esc(q)+'">';
  h+='<button class="search-clear" id="sc">\u2715</button>';
  h+='</div>';
  h+='<div class="chapter-pills">';
  h+='<button class="ch-pill'+(ch===0?' on':'')+'" data-ch="0">全部</button>';
  for(var i=0;i<CHAPTERS.length;i++){var c=CHAPTERS[i];h+='<button class="ch-pill'+(ch===c.chapter?' on':'')+'" data-ch="'+c.chapter+'">第'+c.chapter+'章</button>'}
  h+='</div></div>';

  // Filter
  var filtered=EXAMPLES.filter(function(e){
    if(ch>0&&e.chapter!==ch)return false;
    if(tag&&e.tags.indexOf(tag)===-1)return false;
    if(q){return e.title.toLowerCase().indexOf(q)!==-1||e.description.toLowerCase().indexOf(q)!==-1||e.tags.some(function(t){return t.toLowerCase().indexOf(q)!==-1})}
    return true;
  });

  if(!filtered.length){
    h+='<div class="empty"><div class="empty-icon">&#128269;</div><h3>未找到匹配的例题</h3><p>试试其他关键词或章节</p></div>';
    document.getElementById('content').innerHTML=h;bindEvents();return;
  }

  // Group
  var grp={};
  for(var i=0;i<filtered.length;i++){var e=filtered[i];if(!grp[e.chapter])grp[e.chapter]=[];grp[e.chapter].push(e)}
  var keys=Object.keys(grp).map(Number).sort(function(a,b){return a-b});

  for(var ki=0;ki<keys.length;ki++){
    var cn=keys[ki],ci=CHAPTERS.find(function(c){return c.chapter===cn}),exs=grp[cn];
    h+='<div class="chapter-sec"><div class="ch-head">';
    h+='<div class="ch-num">'+cn+'</div><div class="ch-name">'+esc(ci?ci.title:'')+'</div>';
    h+='<div class="ch-cnt">'+exs.length+' 题</div></div><div class="cards">';
    for(var ei=0;ei<exs.length;ei++){
      var ex=exs[ei],d=diffLabel(ex.difficulty);
      h+='<div class="card" data-id="'+ex.id+'">';
      h+='<div class="card-top"><div class="card-idx">例题 '+esc(ex.number)+'</div><span class="card-go">\u2192</span></div>';
      h+='<div class="card-ttl">'+esc(ex.title)+'</div>';
      h+='<div class="card-desc">'+esc(ex.description)+'</div>';
      h+='<div class="card-ft"><div class="card-tags">';
      for(var ti=0;ti<ex.tags.length;ti++)h+='<span class="card-tag">'+esc(ex.tags[ti])+'</span>';
      h+='</div><span class="diff '+d.cls+'">'+d.text+'</span></div></div>';
    }
    h+='</div></div>';
  }

  document.getElementById('content').innerHTML=h;
  bindEvents();
}

// ====== Detail ======
function renderDetail(id){
  var ex=getEx(id);if(!ex){renderIndex();return}
  var adj=getAdj(id),d=diffLabel(ex.difficulty),h='<div class="detail">';

  h+='<div class="breadcrumb"><a href="#/">目录</a><span class="sep">/</span><a href="#/?chapter='+ex.chapter+'">第'+ex.chapter+'章</a><span class="sep">/</span><span>'+ex.number+'</span></div>';

  h+='<div class="prob-card"><div class="prob-head"><div class="prob-num">'+ex.number.split('.')[1]+'</div><div class="prob-meta">';
  h+='<h2>'+esc(ex.title)+'</h2><div class="prob-ch">';
  h+='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>';
  h+='第'+ex.chapter+'章 · '+esc(ex.chapterTitle);
  h+='<span style="margin-left:6px;padding:2px 7px;border-radius:4px;background:rgba(108,99,255,0.1);color:var(--accent);font-size:10px;font-weight:600">'+d.text+'</span>';
  h+='</div></div></div>';

  h+='<div class="prob-desc"><strong>【题目描述】</strong>'+esc(ex.description)+'</div>';

  // Code
  h+='<div class="code-sec"><div class="sec-ttl"><span class="sec-icon">&lt;/&gt;</span>参考代码</div>';

  h+='<div class="code-block"><div class="code-bar"><span class="code-lang">R</span>';
  h+='<button class="copy-btn" id="cb_'+ex.id+'" onclick="copyCode(\''+ex.id+'\')">';
  h+='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制</button></div>';
  h+='<div class="code-wrap"><div class="code-nums">'+lineNums(ex.code)+'</div><div class="code-body" id="code_'+ex.id+'">'+hlR(ex.code)+'</div></div></div></div>';

  // Result
  var resTypeMap={text:'输出',svg:'图表',image:'图片'};
  var resType=resTypeMap[ex.result.type]||ex.result.type;
  h+='<div class="res-sec">';
  h+='<div class="res-click" id="rp_'+ex.id+'" onclick="showRes(\''+ex.id+'\')">';
  h+='<div class="res-click-icon">&#128065;</div><div class="res-click-txt">查看运行结果</div><div class="res-click-sub">'+resType+' · 点击展开</div></div>';
  h+='<div class="res-show" id="rd_'+ex.id+'"><div class="res-bar"><span class="res-bar-label">R Console</span>';
  h+='<button class="res-toggle" onclick="hideRes(\''+ex.id+'\')">收起</button></div>';
  h+='<div class="res-body">'+renderRes(ex.result);
  if(ex.result.caption)h+='<div class="res-caption">'+esc(ex.result.caption)+'</div>';
  h+='</div></div></div></div>';

  // Nav
  h+='<div class="nav-sec"><div class="nav-row">';
  if(adj.prev){
    h+='<a href="#/example/'+adj.prev.id+'" class="nav-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg><span class="nav-lbl">'+esc(adj.prev.number)+' '+esc(adj.prev.title)+'</span></a>';
  }else{
    h+='<span class="nav-btn off"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 已是第一题</span>';
  }
  if(adj.next){
    h+='<a href="#/example/'+adj.next.id+'" class="nav-btn next"><span class="nav-lbl">'+esc(adj.next.number)+' '+esc(adj.next.title)+'</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>';
  }else{
    h+='<span class="nav-btn next off">已是最后一题 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>';
  }
  h+='</div></div></div>';

  document.getElementById('content').innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}

function copyCode(id){
  var ex=getEx(id);if(!ex)return;var btn=document.getElementById('cb_'+id);
  navigator.clipboard.writeText(ex.code).then(function(){
    if(btn){btn.classList.add('ok');btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 已复制'}
    toast('代码已复制到剪贴板');
    setTimeout(function(){if(btn){btn.classList.remove('ok');btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制'}},2000);
  },function(){
    var ta=document.createElement('textarea');ta.value=ex.code;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    if(btn){btn.classList.add('ok');btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 已复制'}
    toast('代码已复制到剪贴板');
    setTimeout(function(){if(btn){btn.classList.remove('ok');btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制'}},2000);
  });
}
function showRes(id){var p=document.getElementById('rp_'+id),d=document.getElementById('rd_'+id);if(p)p.style.display='none';if(d)d.classList.add('on')}
function hideRes(id){var p=document.getElementById('rp_'+id),d=document.getElementById('rd_'+id);if(p)p.style.display='';if(d)d.classList.remove('on')}

function bindEvents(){
  var cards=document.querySelectorAll('.card');
  for(var i=0;i<cards.length;i++)(function(c){c.addEventListener('click',function(){window.location.hash='#/example/'+c.getAttribute('data-id')})})(cards[i]);

  var pills=document.querySelectorAll('.ch-pill');
  for(var i=0;i<pills.length;i++)(function(p){p.addEventListener('click',function(e){
    e.stopPropagation();var ch=parseInt(p.getAttribute('data-ch'));
    var q=document.getElementById('si')?document.getElementById('si').value:'';
    window.location.hash='#/'+(ch>0?'?chapter='+ch:'')+(q?((ch>0?'&':'?')+'q='+encodeURIComponent(q)):'');
  })})(pills[i]);

  var si=document.getElementById('si'),sc=document.getElementById('sc');
  if(si){
    var t=null;
    si.addEventListener('input',function(){
      if(sc){if(si.value.length>0)sc.classList.add('show');else sc.classList.remove('show')}
      clearTimeout(t);t=setTimeout(function(){
        var q=si.value,act=document.querySelector('.ch-pill.on'),ch=act?parseInt(act.getAttribute('data-ch')):0;
        window.location.hash='#/'+(ch>0?'?chapter='+ch:'')+(q?((ch>0?'&':'?')+'q='+encodeURIComponent(q)):'');
      },300);
    });
    if(sc){
      sc.addEventListener('click',function(){si.value='';sc.classList.remove('show');si.focus();
        var act=document.querySelector('.ch-pill.on'),ch=act?parseInt(act.getAttribute('data-ch')):0;
        window.location.hash='#/'+(ch>0?'?chapter='+ch:'');
      });
      if(si.value.length>0)sc.classList.add('show');
    }
  }
}

// ====== Theme ======
function initTheme(){
  try{var s=localStorage.getItem('r-ex-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}
  var t=document.getElementById('themeToggle');if(!t)return;
  t.addEventListener('click',function(){
    var dk=document.documentElement.getAttribute('data-theme')==='dark';
    if(dk){document.documentElement.removeAttribute('data-theme');try{localStorage.setItem('r-ex-theme','light')}catch(e){}}
    else{document.documentElement.setAttribute('data-theme','dark');try{localStorage.setItem('r-ex-theme','dark')}catch(e){}}
  });
}

// ====== Back to top ======
function initBTT(){
  var b=document.getElementById('backToTop');if(!b)return;
  window.addEventListener('scroll',function(){if(window.scrollY>400)b.classList.add('vis');else b.classList.remove('vis')});
  b.addEventListener('click',function(){window.scrollTo(0,0)});
}

// ====== Router ======
function parseHash(){
  var h=window.location.hash.replace('#','')||'/',path=h,params={},qi=h.indexOf('?');
  if(qi!==-1){path=h.substring(0,qi);var qs=h.substring(qi+1),pairs=qs.split('&');for(var i=0;i<pairs.length;i++){var p=pairs[i].split('=');if(p[0])params[p[0]]=decodeURIComponent(p[1]||'')}}
  return{path:path,params:params};
}
function router(){
  try{
    var r=parseHash(),hb=document.getElementById('homeBtn');
    if(hb)hb.style.display=(r.path==='/'||r.path==='')?'none':'inline-flex';
    if(r.path.indexOf('/example/')===0){renderDetail(r.path.replace('/example/',''))}
    else{renderIndex(parseInt(r.params.chapter)||0,r.params.q||'',r.params.tag||'')}
  }catch(e){
    document.getElementById('content').innerHTML='<div style="padding:40px;text-align:center;color:#FF6584"><h3>渲染出错</h3><p style="color:var(--text3);font-size:12px">'+(e&&e.message?e.message:String(e))+'</p><p style="margin-top:16px"><a href="#/" style="color:#6C63FF">返回首页</a></p></div>';
  }
}

function init(){initTheme();initBTT();window.addEventListener('hashchange',router);router()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body>
</html>
